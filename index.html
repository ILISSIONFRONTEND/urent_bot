<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Urent Control</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0F0F12; color: white; -webkit-tap-highlight-color: transparent; }
        .purple-gradient { background: linear-gradient(135deg, #6D28D9 0%, #4C1D95 100%); }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .battery-fill { transition: width 1s ease-in-out; }
    </style>
</head>
<body class="p-4">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-black italic tracking-tighter">URENT <span class="text-purple-500">MONITOR</span></h1>
        <div id="status-dot" class="w-3 h-3 rounded-full bg-green-500 shadow-[0_0_10px_#22c55e]"></div>
    </div>

    <div id="scooter-list" class="space-y-4">
        <div class="animate-pulse flex flex-col space-y-4">
            <div class="h-32 glass rounded-3xl w-full"></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#0F0F12');

        // Парсим данные из URL (которые пришлет бот)
        const urlParams = new URLSearchParams(window.location.search);
        const rawData = urlParams.get('data');
        
        function render() {
            const list = document.getElementById('scooter-list');
            if (!rawData) {
                list.innerHTML = `<div class="text-center opacity-50 mt-10">Данные не переданы.<br>Запусти через бота!</div>`;
                return;
            }

            const scooters = JSON.parse(decodeURIComponent(rawData));
            list.innerHTML = '';

            scooters.forEach(s => {
                const isLow = s.pct < 20;
                const batteryColor = isLow ? 'bg-red-500' : (s.pct < 50 ? 'bg-yellow-500' : 'bg-green-500');
                
                list.innerHTML += `
                    <div class="glass rounded-[24px] p-5 relative overflow-hidden active:scale-[0.98] transition-transform" 
                         onclick="Telegram.WebApp.HapticFeedback.impactOccurred('medium')">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <div class="text-xs opacity-50 uppercase font-bold tracking-widest mb-1">ID Объекта</div>
                                <div class="text-xl font-mono font-black">#${s.id}</div>
                            </div>
                            <div class="purple-gradient p-2 rounded-xl">
                                🛴
                            </div>
                        </div>

                        <div class="space-y-2">
                            <div class="flex justify-between text-sm font-bold">
                                <span>Заряд батареи</span>
                                <span class="${isLow ? 'text-red-500 animate-pulse' : ''}">${s.pct}%</span>
                            </div>
                            <div class="w-full h-3 bg-white/10 rounded-full overflow-hidden">
                                <div class="battery-fill h-full ${batteryColor}" style="width: ${s.pct}%"></div>
                            </div>
                        </div>

                        <div class="mt-4 flex justify-between items-center border-t border-white/10 pt-4">
                            <div class="text-sm opacity-70">🛣 Запас хода: <b>${s.dist} км</b></div>
                            <button class="text-xs font-black text-purple-400 uppercase tracking-tighter">Найти на карте →</button>
                        </div>
                    </div>
                `;
            });
        }

        render();
        tg.MainButton.setText("ОБНОВИТЬ ПАРК").show().onClick(() => {
            tg.HapticFeedback.notificationOccurred('success');
            location.reload();
        });
    </script>
</body>
</html>
