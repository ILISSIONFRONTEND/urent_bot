<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urent Monitor</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: var(--tg-theme-bg-color); /* Берет цвет из темы телеграма */
            color: var(--tg-theme-text-color);
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #2c2c2e;
            border-radius: 15px;
            padding: 20px;
            width: 80%;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            border: 1px solid #ffdd00; /* Цвет Юрента */
        }
        button {
            background: #ffdd00;
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
            margin-top: 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🛴 СТАТУС ПАРКА</h1>
        <p>Самокатов в сети: <span id="count">12</span></p>
        <button onclick="Telegram.WebApp.close()">ЗАКРЫТЬ</button>
    </div>

    <script>
        // Инициализация Web App
        let tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран
        
        // Можно менять цвет кнопки сверху
        tg.MainButton.setText("ОБНОВИТЬ КАРТУ").show();
    </script>
</body>
</html>
